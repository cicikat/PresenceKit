name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # config.yaml is deliberately private and gitignored.  The smoke suite
      # must exercise the public fresh-clone contract, not a developer's local
      # character.default or credentials.
      - name: Prepare public fresh-clone configuration
        run: cp config.example.yaml config.yaml

      # v0.1 smoke subset: keep a focused, public-asset-only regression suite.
      # A failure here is actionable; tests must not assume a private config or
      # character assets beyond config.example.yaml and tracked defaults.
      - name: Run v0.1 pytest smoke subset
        run: >
          python -m pytest -q
          tests/test_n8_auth.py
          tests/test_sec_auth1.py
          tests/test_sec_ws1_auth.py
          tests/test_n9_safe_write.py
          tests/test_final_p1_blockers.py
          tests/test_scope_freeze_r1_n1_n10.py
          tests/test_memory_direct_path_lint.py
          tests/test_r1b_qq_convergence_audit.py
          tests/test_r1d_qq_reality_reply_adapter.py
          tests/test_r2d_defer_queue_dnd.py
          tests/test_r3_scope_lint.py
          tests/test_r4_prompt_layer_boundary.py
          tests/test_r5_author_note_tool_alignment.py
          tests/test_r6_reality_scrub_audit.py
          tests/test_r6b_reality_scrub_contract.py
          tests/test_r6c_reality_scrub_final.py
          tests/test_r8b_trait_tracker_queue.py
          tests/test_r8c_author_note_rotator_scope.py
