  buttplug_ws: ws://127.0.0.1:12345
mail:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 587
  proxy_url: http://127.0.0.1:YOUR-端口
  smtp_user: YOUR-接收的邮箱
  smtp_password: YOUR-邮箱通行密码
  from_addr: YOUR-发送的邮箱
  from_name: 角色名
  to_addr: YOUR-邮箱
  subject_prefix: 【来信】
plugins:
  voice:
    enabled: false
    mode: local
    local_url: http://127.0.0.1:9880
  image:
    enabled: false
    mode: local
    local_url: http://127.0.0.1:7860
logging:
  console_quiet: true   # true=只 WARNING+ 上控制台 + 丢成功 access；false=恢复啰嗦
# ── 语义 Embedding（向量召回，见 docs/vector-store.md）─────────────────────────
# 不配此块时，向量召回自动关闭，退回关键词路径（fail-open）。
embedding:
  provider_kind: openai_compat          # 阶段 A：OpenAI 兼容 /embeddings 端点
  base_url: https://your-embedding-endpoint/v1
  api_key: YOUR_EMBEDDING_KEY           # 真 key 只进 config.yaml（已 gitignore）
  model: bge-m3                          # 或任意中文 embedding 模型
  dim: 1024                              # 必须与 model 输出维度一致
# ── 召回融合权重（X2，见 docs/vector-store.md）────────────────────────────────
# score = w_sem*semantic_sim + w_kw*keyword_relevance + w_strength*(strength*decay)
# 三权重之和建议≈1.0；无 embedding 时 w_sem 项自动为 0（fail-open）。
recall:
  weights:
    sem: 0.4         # 语义相似度权重
    kw: 0.3          # 关键词相关度权重
    strength: 0.3    # 强度×衰减权重
  batch_size: 32

screen_peek:
  enabled: false           # 默认关；在设置页打开后他可自主查看屏幕内容
  cooldown_minutes: 30     # 同一文件/窗口最短间隔分钟数（范围 5–240）

action_trace:
  enabled: true              # 关闭后不记录、不注入，零行为变化（回滚开关）
  inject_max_items: 5        # 层 10.5 最多注入几条痕迹
  inject_window_hours: 24    # 只注入这个时间窗内的痕迹
  event_log_echo: true       # status=ok 时是否回流一条到 event_log（供日记/往事检索看见）

# Brief 35 · Path B（意图反射）两步降级第一步：默认关，现有用户升级即关。
# 观察一个月：tool loop（Path C）+ 探针覆盖是否已顶替 Path B；无缺口则第二步整删
# _parse_and_execute_intent + 五道守卫 + c2 幂等窗口 + 相关测试。见 docs/known-issues.md。
intent_reflex:
  enabled: false

# Brief 28 · tool loop 多步工具执行器：只在 chat preset 为 function_calling 模式的
# owner 真实私聊（QQ / desktop）生效，小模型 xml_fallback / 探针路径零改动。
# enabled: false 即完全回到现状（所有分支都在 tool_loop_active() 判断之后）。
tool_loop:
  enabled: false
  max_steps: 5               # 单轮最多调用工具的步数，前端可调 1-8
  total_timeout_s: 90        # 整个 loop 墙钟超时，超时按步数耗尽处理
  categories: ["info", "desktop", "memory"]
  exclude_tools: ["toy_vibrate", "toy_stop", "toy_pattern", "write_toy_file"]  # 硬件写类默认排除
  nudge_hint: true           # 首步注入"别凭记忆编造，需要就调工具"的软提示（Brief 29 · 5）

# Brief 32 · 内部思考链：主生成前一段不输出给用户的内心思考，缓解"不带思考有些生硬"。
# 两条路按 preset 能力自动选（mode: auto）：preset.reasoning_native=true → native
# （extra_body 逃生舱直通网关，见 model_presets.presets.deepseek-reasoner 示例）；
# 否则 → monologue（一次轻量调用产出内心活动，注入当轮 messages 尾部，用完即弃）。
# 铁律：思考内容永不进 short_term history / 广播 / event_log。
thinking:
  enabled: false             # 总开关，默认关
  mode: auto                 # auto | native | monologue
  monologue_max_tokens: 200
  apply_to_proactive: false  # scheduler 主动消息是否也思考（默认省钱不开）

# MCP（Model Context Protocol）外部工具客户端（Brief 29 · 4）。
# 只接外部工具，不接 resources/prompts、不接外部记忆库——外接记忆会绕过 prompt 层注入
# 与固化链，裂成两套真相。工具只经 tool loop 暴露：角色卡 presence_ext.tool_categories
# 含 "mcp" 才看得见这些工具，其余角色扮演场景不受影响。
mcp_servers:
  enabled: false
  servers: []
    # - name: filesystem
    #   transport: stdio            # stdio | http（streamable http）
    #   command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "D:/some/dir"]
    #   # http 时用: url: https://your-mcp-server.example/mcp
    #   tool_timeout_s: 30
    #   allow_tools: []              # 空 = 全部；非空 = 白名单

# fs 只读浏览工具（Brief 31）：fs_list / fs_read，只读，范围严格限于 allow_roots。
# 与 MCP 同策略——只经 tool loop 暴露，角色卡 presence_ext.tool_categories 含 "fs" 才看得见。
fs_access:
  enabled: false                  # 总开关，默认关
  allow_roots: []                  # 只读允许根，绝对路径，用户手填，如 "D:/some/dir"
  deny_names:                      # 命中即拒（对路径任一段做大小写不敏感子串匹配）
  - secrets
  - .env
  - .git
  - node_modules
  - __pycache__
  - config.yaml
  - token
  max_read_chars: 4000            # 单次读取截断
  max_list_entries: 100           # 单次列目录条数上限

mode: production
standalone_mode: false
data_prefix: "data"
memory:
  short_term_rounds: 50
  short_term_disk_rounds: 80
  group_context_lines: 50
  group_context_keep_latest: 3   # 末尾 N 条无条件保留（保连贯）
  group_context_top_k: 5         # 相关消息最多取 K 条
  group_context_min_score: 0.3   # 低于此分的消息过滤掉
  rag_top_k: 5
  rag_score_threshold: 0.6
  summary_every_n_rounds: 20
episodic:
  two_hop_enabled: false   # 默认关；置 true 开二跳做对比测试
anti_collapse:
  enabled: true            # 字数坍缩纠偏总开关
  short_max: 60            # 字符数 < 60 为短句，>= 60 为长句（单边界，只分两挡）
  recent_n_long: 4         # 近 4 条全为长句 → 触发（长句易触发，模型爱往注水长句坍缩）
  recent_n_short: 7        # 近 7 条全为短句 → 才触发（短句难触发，短句反而更像活人）
  prefix_retry: true       # 输出仍以检测到的重复句首开头时，追加强指令重试 1 次（硬止血）
  hint_rounds: 3           # 长度/分段提示触发后连续注入的轮数（per-uid 内存计数器，重启丢失可接受）
  segment_min_len: 40      # 分段坍缩阈值：无换行且字数超过此值才计一次"未分段"命中
  segment_recent_n: 2      # 连续几轮命中"未分段"才触发分段提示（同样延续 hint_rounds 轮）
  # 旧键 recent_n / thresholds 已废弃，读到时忽略并打 warning，不做自动迁移
context:
  max_turns: 30
chat:
  mode: chat
  style: chat
  multi_message: true
group_chat:
  min_responders: 1
  max_responders: 2
  max_ai_chain_depth: 2
  respond_threshold: 0.5
  spontaneous_threshold: 0.7
  addressed_exclusive: false
  transcript_limit: 200
  memory_strength:
    solo: 1.0
    group: 0.7
    trigger: 0.4
  debug_token_log: true
diary:
  obsidian_path: 日记路径
  characters:
  - 角色名
retention:
  inbox:
    max_age_days: 7
  image_cache:
    max_age_days: 30
    max_files: 500
  dead_letter_queue:
    max_files: 200
  reminders:
    prune_done_days: 30
  dreams_archive:
    max_files: 200
  observations:
    max_raw: 100
coplay:
  # 部署级开关："是否允许陪玩功能存在"，不是运行时开关——运行时是否真正轮询由
  # 用户在前端"游戏模式"开关驱动的状态机（armed/off）决定，这里默认 true。
  # 只有完全不想部署此功能时才设 false，此时 /coplay/arm 会返回 409。
  enabled: true
  pet_launch_cmd: ''
  poll_interval: 10
  game_whitelist: []
  steam_library_paths: []
  screenshot_interval: 8
character:
  default: default
  name: 角色名
  consistency_check_every_n: 15
# 用户显示名（可选）：梦境等 prompt 层用它称呼用户；留空则用无名称写法（只用"你"）。
user:
  display_name: ""
session:
  timeout_minutes: 10
scheduler:
  enabled: true
  overflow_trigger: true
  presence_nag: true
  presence_nag_minutes: 60
  activity_level: high
  owner_id: ''  # 留空 = 未配置，调度器会跳过主动触发；填你的 QQ 号或 desktop/mobile 用的 uid（仅 A-Za-z0-9_- ）
  owner_birthday: MM-DD  # 格式示例：01-01
  morning_greeting: true
  night_reminder: true
  random_message: true
  like_enabled: true
  moments_enabled: true
  signature_enabled: true
  signatures:
  - 示例签名文字  # 可填多条，角色会轮换展示
  daily_journal: true
  period_reminder: true
  diary_reminder: true
  diary_inject: true
  timenode: true
  festival: true
  holiday_boost: true
  sensor_aware:
    enabled: true
    tick_interval_seconds: 30
  global_proactive_min_gap_seconds: 5400   # 主动消息全局最小间隔：90分钟（±20% jitter，一次性采样，只增不减）；想更克制就调大。对应 admin PUT /scheduler/config 的 global_proactive_min_gap_hours=1.5。改后 ≤60s 内经 config 热加载生效，无需重启（core/config_loader.py mtime 检查）。
  max_daily_proactive: 8   # 当日主动消息总条数上限（ProactiveLedger，按 rhythm.py 逻辑日重置，5点前算前一天）；emergency 优先级触发器豁免但仍计入统计。
  gating_shadow:
    enabled: true
    max_size_mb: 5
    keep: 3
error:
  max_retries: 3
  retry_delay_seconds: 2
  fallback_message: 我现在有点累，等会儿再聊～
toy_autogrow:
  enabled: false           # true=他每轮判断后自主写入思考笔记；false=退回纯手动玩具
  min_interval_hours: 6   # 同一角色/用户最短写入间隔（小时）
  target: diary            # 写入目标文件键：diary=思考笔记，wishlist=愿望清单，doodle=涂鸦板

web_autosearch:
  enabled: false           # true=他可在author_note提示下自主调用web_search；false=纯反应式（用户明确要求才搜）
  min_interval_min: 30     # 自主搜索最短间隔（分钟），防止频繁搜索；用户明确触发不受此限

forensic_logs:
  max_size_mb: 5
  keep: 5
  event_log:
    day_archive_days: 30
    full_log_max_size_mb: 10
    full_log_keep: 3

performance_mapping:
  enabled: true        # false = enrich_say_segments 直接透传，行为与现在完全一致
  provider: rules       # rules | llm
  llm_timeout_sec: 3.0   # llm provider 外层超时，超时放弃标注直接下发

toy_autogrow:
  enabled: true
  min_interval_hours: 6
  target: diary

embedding:
  provider_kind: openai_compat
  base_url: https://api.siliconflow.cn/v1
  api_key: sk-YOUR-EMBEDDING-API-KEY-HERE
  model: BAAI/bge-m3
  dim: 1024

recall:
  weights:
    sem: 0.4
    kw: 0.3
    strength: 0.3
  batch_size: 32
