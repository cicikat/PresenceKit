# ── 多模型 Preset 系统（推荐，见 docs/model-presets.md）──────────────────────
# 若不配此块，系统自动从下方 llm: 块合成等价行为（向后兼容）。
model_presets:
  active_routing: default          # 当前生效的路由方案名

  defaults:                        # 全局生成参数默认值
    temperature: 1.0
    top_p: 0.9
    max_tokens: 4000
    frequency_penalty: 0.3
    presence_penalty: 0.4

  presets:
    deepseek-default:
      provider_kind: deepseek
      base_url: https://api.deepseek.com
      api_key: YOUR_DEEPSEEK_API_KEY
      model: deepseek-chat
      tool_call_mode: function_calling
      params:
        temperature: 1.0
        frequency_penalty: 0.3
        presence_penalty: 0.4

    claude-sonnet:
      provider_kind: anthropic_compat  # Claude 经 OpenAI 兼容层
      base_url: https://your-oneapi.example/v1
      api_key: YOUR_ONEAPI_KEY
      model: claude-sonnet-4-6
      tool_call_mode: function_calling
      # prompt_style 省略 → anthropic_compat 默认 xml
      params:
        temperature: 0.8
        # frequency/presence_penalty 被白名单过滤，不会发给 API

    local-qwen:
      provider_kind: local
      base_url: http://127.0.0.1:8000/v1
      api_key: none
      model: qwen2.5-72b-instruct
      tool_call_mode: xml_fallback
      prompt_style: narrative

    deepseek-reasoner:              # 原生 reasoning 示例（Brief 32）；无 function_calling
      provider_kind: deepseek
      base_url: https://api.deepseek.com
      api_key: YOUR_DEEPSEEK_API_KEY
      model: deepseek-reasoner
      tool_call_mode: xml_fallback  # deepseek-reasoner 不支持 FC，与 tool loop 天然互斥
      reasoning_native: true        # 声明该 preset 有原生思考（thinking.mode=auto 时据此选 native）
      reasoning_extra_body: {}      # 原样经 OpenAI client 的 extra_body 透传，绕过参数白名单（逃生舱）；
                                     # 网关方言差异（o系 reasoning_effort、anthropic 网关 thinking budget
                                     # 等）自己按目标网关文档填，代码不做每家适配

  routing_profiles:
    default:                       # 全 DeepSeek，等价旧行为
      chat:           deepseek-default
      intent:         deepseek-default
      probe:          deepseek-default
      summary:        deepseek-default
      detect_emotion: deepseek-default
      consolidation:  deepseek-default
      perform:        deepseek-default   # 句级表演意图映射（仅 performance_mapping.provider=llm 时使用）
      monologue:      deepseek-default   # 前置独白轻量调用（Brief 32）；显式指到便宜 preset，
                                          # 缺省会回落 chat 键走主力贵模型

    claude-main:                   # 主对话走 Claude，杂活留 DS
      chat:           claude-sonnet
      intent:         deepseek-default
      probe:          deepseek-default
      summary:        deepseek-default
      detect_emotion: deepseek-default
      consolidation:  deepseek-default
      perform:        deepseek-default
      monologue:      deepseek-default

# ── Legacy 扁平 llm: 块（向后兼容，无 model_presets 时生效）────────────────
llm:
  provider: deepseek
  api_key: YOUR_DEEPSEEK_API_KEY
  model: deepseek-chat
  base_url: https://api.deepseek.com
  tool_call_mode: function_calling
  temperature: 1
  top_p: 0.9
  max_tokens: 4000
  frequency_penalty: 0.3
  presence_penalty: 0.4
vision:
  enabled: true
  provider: glm
  api_key: YOUR_VISION_API_KEY
  model: glm-4v-flash
  base_url: https://open.bigmodel.cn/api/paas/v4/
qq:
  enabled: true
  host: 127.0.0.1
  port: 3001
admin:
  enabled: true
  auto_start: true
  host: 127.0.0.1        # 默认仅本机可访问；局域网/公网访问需显式改成对应地址并配强口令（见下方 secret_key 说明）
  port: 8080             # 管理面板端口，浏览器访问 http://127.0.0.1:8080
  # 请改随机值，优先用环境变量 YEXUAN_ADMIN_SECRET（会覆盖这里的值）。
  # SEC-AUTH-2：这个值等价于 admin scope 的 bootstrap token（label legacy-admin），全权。
  # 边缘设备（手机/Watch/ESP32/手机轮询端）应改用 POST /auth/tokens 签发的最小权限 token
  # （P3 落地后可用；见 docs/security.md），不要把这个 secret_key 烧进边缘设备配置里。
  secret_key: YOUR_ADMIN_SECRET
notify:
  enabled: true
  target_qq: YOUR-TARGET-QQ
  message: 已上线，等你回来
