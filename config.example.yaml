# ── 多模型 Preset 系统（推荐，见 docs/model-presets.md）──────────────────────
# 若不配此块，系统自动从下方 llm: 块合成等价行为（向后兼容）。
model_presets:
  active_routing: default          # 当前生效的路由方案名

  defaults:                        # 全局生成参数默认值
    temperature: 1.0
    top_p: 0.9
    max_tokens: 4000
    frequency_penalty: 0.3
    presence_penalty: 0.4

  presets:
    deepseek-default:
      provider_kind: deepseek
      base_url: https://api.deepseek.com
      api_key: YOUR_DEEPSEEK_API_KEY
      model: deepseek-chat
      tool_call_mode: function_calling
      params:
        temperature: 1.0
        frequency_penalty: 0.3
        presence_penalty: 0.4

    claude-sonnet:
      provider_kind: anthropic_compat  # Claude 经 OpenAI 兼容层
      base_url: https://your-oneapi.example/v1
      api_key: YOUR_ONEAPI_KEY
      model: claude-sonnet-4-6
      tool_call_mode: function_calling
      # prompt_style 省略 → anthropic_compat 默认 xml
      params:
        temperature: 0.8
        # frequency/presence_penalty 被白名单过滤，不会发给 API

    local-qwen:
      provider_kind: local
      base_url: http://127.0.0.1:8000/v1
      api_key: none
      model: qwen2.5-72b-instruct
      tool_call_mode: xml_fallback
      prompt_style: narrative

  routing_profiles:
    default:                       # 全 DeepSeek，等价旧行为
      chat:           deepseek-default
      intent:         deepseek-default
      probe:          deepseek-default
      summary:        deepseek-default
      detect_emotion: deepseek-default
      consolidation:  deepseek-default
      perform:        deepseek-default   # 句级表演意图映射（仅 performance_mapping.provider=llm 时使用）

    claude-main:                   # 主对话走 Claude，杂活留 DS
      chat:           claude-sonnet
      intent:         deepseek-default
      probe:          deepseek-default
      summary:        deepseek-default
      detect_emotion: deepseek-default
      consolidation:  deepseek-default
      perform:        deepseek-default

