# 公开默认角色的中性 activity_pool 示例。
# 与 characters/default.json 配套：README quickstart 用这套资产完成开箱体验。
# 字段说明见 content/characters/yexuan/activity_pool.example.yaml。

activities:
  - id: reading
    text: "在读{book}"
    books:
      - "一本随手翻开的书"
    arcs: [morning, afternoon, evening]
    weight: 1.0

  - id: resting
    text: "在发呆，没在想什么具体的事"
    arcs: [deep_night, morning]
    weight: 1.0

  - id: idle_thinking
    text: "在想一件跟你无关的小事"
    arcs: [late_morning, afternoon]
    weight: 1.0

arcs:
  deep_night:   [23, 24, 0, 1, 2, 3, 4, 5]
  morning:      [5, 6, 7, 8, 9]
  late_morning: [9, 10, 11, 12]
  afternoon:    [12, 13, 14, 15, 16, 17]
  evening:      [17, 18, 19, 20, 21, 22, 23]
